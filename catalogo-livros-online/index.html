<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Livros Online</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <h1>Catálogo de Livros</h1>

        <!-- mensagens -->
        <div id="mensagem" class="mensagem"></div>

        <!-- livros -->
        <div id="livros-lista"></div>

        <h2>Adicionar Novo Livro</h2>
        <form id="adicionar-livro-form">
            <label for="titulo">Título</label>
            <input type="text" id="titulo" placeholder="Título" required>

            <label for="autor">Autor</label>
            <input type="text" id="autor" placeholder="Autor" required>

            <label for="genero">Gênero</label>
            <input type="text" id="genero" placeholder="Gênero" required>

            <label for="ano">Ano de Publicação</label>
            <input type="number" id="ano" placeholder="Ano de Publicação" required>

            <button type="submit">Adicionar Livro</button>
        </form>

        <h2>Buscar Livro</h2>
        <input type="text" id="buscar-livro" placeholder="Buscar por título, autor ou gênero">
        <button id="buscar-btn">Buscar</button>

        <h2>Classificar Livros</h2>
        <div id="classificar-opcoes">
            <button id="classificar-titulo">Por Título</button>
            <button id="classificar-autor">Por Autor</button>
            <button id="classificar-avaliacao">Por Avaliação</button>
        </div>
    </div>

    <footer class="rodape">
        &copy; 2025 Fenix. Todos os direitos reservados.
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
