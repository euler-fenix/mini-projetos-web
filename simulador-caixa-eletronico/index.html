<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Caixa Eletrônico</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Simulador de Caixa Eletrônico</h1>
        <form id="atm-form">
            <label for="operation">Escolha uma operação:</label>
            <select id="operation" required>
                <option value="consultar">Consultar Saldo</option>
                <option value="sacar">Sacar</option>
                <option value="depositar">Depositar</option>
            </select>

            <label for="amount">Valor (R$):</label>
            <input type="number" id="amount" min="1" step="0.01" placeholder="Insira o valor (R$)" required>

            <button type="button" onclick="realizarOperacao()">Realizar</button>
        </form>

        <p id="result"></p>
    </div>

    <footer class="rodape">
        &copy; 2025 Fenix App. Todos os direitos reservados.
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
