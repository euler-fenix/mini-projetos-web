<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anotações</title>
    <!-- Link Font -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="app-container">

        <header>
            <h1>Aplicativo de Anotações</h1>
        </header>

        <!-- mensagens -->
        <section class="mensagem-section">
            <p id="mensagem" class="mensagem"></p>
        </section>

        <!-- input -->
        <section class="input-section">
            <input type="text" id="notaInput" placeholder="Digite sua nota..." />
            <button id="adicionarNotaBtn">Adicionar Nota</button>
        </section>

        <!-- Lista notas -->
        <section class="notas-section">
            <ul id="listaNotas"></ul>
        </section>

    </div>

    <footer class="rodape">
        &copy; 2024 Fenix App. Todos os direitos reservados.
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
